<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulario</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div>
            <h2> Formulario de registro </h2>
        </div>

        <div>
            <form id="formulario">
                <div>
                    <label for="username"> Nombre </label>
                    <input type="text" id="username" placeholder="Escribe tu Nombre" required>
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div>
                    <label for="email"> Email </label>
                    <input type="text" id="email" placeholder="Escribe tu direccion Email" required>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div>
                    <label for="password"> Contraseña </label>
                    <input type="password" id="password" placeholder="Escribe tu contraseña" required>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div>
                    <button type="submit" id="submitButton" disabled> Guardar</button>
                    <span id="successMessage" class="error"></span>
                </div>
            </form>
        </div>

        <hr>
            <div>
                <button id="btnCargar">Cargar ultima informacion</button>
                <div id="ultimoRegistro"></div>
            </div>
        <script src="js/script.js"></script>
    </body>
</html>
